services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: sqlite:////data/ai_berkshire.db
      USE_REAL_DATA: "true"
      NETWORK_TIMEOUT: "3"
      ENABLE_AKSHARE_BREADTH: "false"
      AUTO_SEED_DB: "true"
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - backend-data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    environment:
      API_INTERNAL_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  backend-data:
